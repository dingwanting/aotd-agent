<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AOTD | 网易云播放页</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff7fb;
        --card: rgba(255, 255, 255, 0.82);
        --text: #4b3740;
        --muted: rgba(75, 55, 64, 0.68);
        --line: rgba(229, 139, 168, 0.18);
        --accent: #ce7493;
        --accent-strong: #b85f80;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 240, 246, 0.95), transparent 32%),
          linear-gradient(180deg, #fff8fb 0%, #f9eef3 100%);
        color: var(--text);
      }

      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 18px 40px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 22px 18px;
        box-shadow: 0 10px 28px rgba(212, 146, 173, 0.12);
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.18em;
        color: var(--accent);
      }

      .title {
        margin: 14px 0 0;
        font-size: 28px;
        line-height: 1.24;
        font-weight: 700;
      }

      .artist {
        margin: 10px 0 0;
        font-size: 16px;
        line-height: 1.5;
        color: var(--muted);
      }

      .hint {
        margin: 12px 0 0;
        font-size: 14px;
        line-height: 1.6;
        color: var(--muted);
      }

      .audio-shell {
        margin-top: 18px;
      }

      audio {
        width: 100%;
        margin-top: 10px;
      }

      .actions {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .button {
        appearance: none;
        border: none;
        width: 100%;
        min-height: 48px;
        border-radius: 999px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
      }

      .button-primary {
        background: linear-gradient(135deg, #e58ba8 0%, #ce7493 100%);
        color: #fff;
      }

      .button-secondary {
        background: rgba(229, 139, 168, 0.1);
        color: var(--accent-strong);
        border: 1px solid rgba(229, 139, 168, 0.28);
      }

      .state {
        margin-top: 16px;
        font-size: 14px;
        line-height: 1.6;
        color: var(--muted);
      }

      .state-error {
        color: #9d4b68;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="eyebrow">AOTD PLAYER</div>
        <h1 id="title" class="title">正在准备这首歌...</h1>
        <p id="artist" class="artist"></p>
        <p class="hint">先在这里听一下。想听完整版，再去网易云。</p>

        <div class="audio-shell">
          <audio id="audio" controls preload="metadata"></audio>
          <div id="state" class="state">正在加载播放链接...</div>
        </div>

        <div class="actions">
          <a id="netease-link" class="button button-primary" href="https://music.163.com/" target="_blank" rel="noreferrer">
            去网易云听完整版
          </a>
          <button id="retry-button" class="button button-secondary" type="button">重新加载</button>
        </div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const title = params.get("title") || "这首歌";
      const artist = params.get("artist") || "";
      const keyword = params.get("keyword") || "";
      const originalId = params.get("originalId") || "";

      const titleEl = document.getElementById("title");
      const artistEl = document.getElementById("artist");
      const audioEl = document.getElementById("audio");
      const stateEl = document.getElementById("state");
      const neteaseLinkEl = document.getElementById("netease-link");
      const retryButtonEl = document.getElementById("retry-button");

      titleEl.textContent = title;
      artistEl.textContent = artist ? artist : "AOTD 为你找到的这首歌";

      const playParams = new URLSearchParams();
      if (keyword) playParams.set("keyword", keyword);
      if (title) playParams.set("title", title);
      if (artist) playParams.set("artist", artist);
      if (originalId) playParams.set("originalId", originalId);

      neteaseLinkEl.href = `/api/netease/play?${playParams.toString()}`;

      async function loadAudio() {
        stateEl.textContent = "正在加载播放链接...";
        stateEl.className = "state";
        audioEl.removeAttribute("src");
        audioEl.load();

        const response = await fetch(`/api/netease/audio/resolve?${playParams.toString()}`);
        const payload = await response.json();
        if (!response.ok || !payload || !payload.playable || !payload.audioUrl) {
          throw new Error((payload && (payload.message || payload.error)) || "暂时没拿到播放链接");
        }

        audioEl.src = payload.audioUrl;
        audioEl.load();
        stateEl.textContent = "可以先试听一下，想听完整的再去网易云。";
      }

      retryButtonEl.addEventListener("click", () => {
        loadAudio().catch((error) => {
          stateEl.textContent = error && error.message ? error.message : "播放链接加载失败";
          stateEl.className = "state state-error";
        });
      });

      loadAudio().catch((error) => {
        stateEl.textContent = error && error.message ? error.message : "播放链接加载失败";
        stateEl.className = "state state-error";
      });
    </script>
  </body>
</html>
